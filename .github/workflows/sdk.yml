# .github/workflows/sdk.yml
name: Bazaar SDK Tests

on:
  push:
    paths:
      - "marketplace/sdk/**"
      - "tests/unit/bazaar/**"
      - "tests/sdk/**"
  pull_request:
    paths:
      - "marketplace/sdk/**"
      - "tests/unit/bazaar/**"
      - "tests/sdk/**"

jobs:
  sdk-unit:
    name: SDK Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Run SDK unit tests
        run: |
          pytest tests/unit/bazaar/ -v --tb=short \
            --junitxml=reports/sdk-unit.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-unit-report
          path: reports/sdk-unit.xml

  sdk-integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    needs: sdk-unit         # only run if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Run SDK integration tests
        run: |
          pytest -m sdk tests/sdk/ -v --tb=short \
            --junitxml=reports/sdk-integration.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-integration-report
          path: reports/sdk-integration.xml
